<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meeting Your Days Luck - 9 Doors</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0f0e1a, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 16px;
            color: #fff;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px 18px 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.15);
            text-align: center;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .app-header h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #f7e05e, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .app-subtitle {
            font-size: 0.75rem;
            opacity: 0.5;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: -6px;
            margin-bottom: 14px;
            color: #aaa;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0 20px;
        }

        .door {
            aspect-ratio: 1 / 1;
            background: radial-gradient(circle at 35% 30%, #5a4d32, #2a1f12);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            box-shadow: 0 8px 0 #0f0a05, 0 12px 28px rgba(0, 0, 0, 0.7);
            cursor: pointer;
            transition: all 0.12s ease;
            border: 2px solid #7a694a;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .door:active {
            transform: scale(0.92);
            box-shadow: 0 4px 0 #0f0a05;
        }

        .door.revealed {
            background: radial-gradient(circle at 30% 30%, #2a3a2a, #1a2a1a);
            border-color: #f1c40f;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.25), 0 8px 0 #0f0a05;
            transform: scale(1.02);
            cursor: default;
        }

        .door.knocking {
            animation: knock 0.45s ease 2;
        }

        @keyframes knock {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(0.82) rotate(-4deg); }
            50% { transform: scale(1.08) rotate(4deg); }
            75% { transform: scale(0.95) rotate(-2deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .door .door-number {
            position: absolute;
            top: 6px;
            right: 10px;
            font-size: 0.55rem;
            opacity: 0.25;
            color: #b89a6a;
            font-weight: bold;
        }

        .commentary-box {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 60px;
            padding: 18px 24px;
            margin: 12px 0 18px;
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 5px solid #f1c40f;
            font-style: italic;
            font-size: 0.92rem;
            line-height: 1.6;
            color: #f5e6d3;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
            word-break: break-word;
            transition: all 0.2s;
        }

        .commentary-box .comment-emoji {
            font-size: 1.6rem;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .button-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn {
            background: #2c3e50;
            border: none;
            color: #ecf0f1;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid rgba(241, 196, 15, 0.3);
            box-shadow: 0 5px 0 #1a2632;
            flex: 1;
            min-width: 120px;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #1a2632;
        }

        .btn:hover {
            background: #34495e;
            color: #f1c40f;
            border-color: #f1c40f;
        }

        .btn-primary {
            background: #f1c40f;
            color: #1a1a2e;
            border-color: #f1c40f;
            box-shadow: 0 5px 0 #b38f0a;
        }

        .btn-primary:hover {
            background: #f7d44a;
            color: #0f0e1a;
        }

        .btn-primary:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #b38f0a;
        }

        .counter {
            font-size: 0.75rem;
            opacity: 0.5;
            margin-top: 14px;
            letter-spacing: 1px;
            color: #aaa;
        }

        .hand-icon {
            font-size: 1.2rem;
            margin-right: 6px;
        }

        .fate-badge {
            display: inline-block;
            background: rgba(241, 196, 15, 0.15);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #f1c40f;
            border: 1px solid rgba(241, 196, 15, 0.2);
            margin-top: 4px;
        }

        /* Scrollable commentary for long text */
        .commentary-box span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 400px) {
            .game-container { padding: 14px 12px 20px; }
            .door { font-size: 2.2rem; border-radius: 16px; }
            .grid { gap: 8px; }
            .commentary-box { font-size: 0.82rem; padding: 14px 16px; min-height: 66px; }
            .app-header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- App Header -->
    <div class="app-header">
        <span style="font-size:1.8rem;">👑</span>
        <h1>Meeting Your Days Luck</h1>
    </div>
    <div class="app-subtitle">✦ The 9 Doors of Fate ✦</div>

    <!-- Door Grid -->
    <div class="grid" id="doorGrid"></div>

    <!-- Commentary Bottom Feed -->
    <div class="commentary-box" id="commentary">
        <span>
            <span class="comment-emoji">👋</span>
            <span>The Prince awaits. Tap a door...</span>
        </span>
    </div>

    <!-- Buttons -->
    <div class="button-row">
        <button class="btn btn-primary" id="resetGame">⟳ New Fate</button>
        <button class="btn" id="shuffleDoors">🎲 Shuffle</button>
    </div>

    <div class="counter" id="counterDisplay">Doors opened: 0 / 9</div>
    <div class="fate-badge" id="fateBadge">✨ Your luck is loading...</div>
</div>

<script>
    (function() {
        // ============================================================
        //  THE 9 FATES – Emoji + Playful Commentary
        // ============================================================
        const FATES = [
            { 
                emoji: '🪙', 
                comment: 'Prince Charming? No, that\'s your bank account sweating. Buy a coffee... or a small island.' 
            },
            { 
                emoji: '✈️', 
                comment: 'The universe says "GO." Your boss says "STAY." Start packing an imaginary bag.' 
            },
            { 
                emoji: '💸', 
                comment: 'Cha-ching! That\'s the sound of your bills laughing. Go buy a lottery ticket NOW.' 
            },
            { 
                emoji: '👩', 
                comment: 'Watch out! Your charm level just hit 100. Try not to break the mirrors.' 
            },
            { 
                emoji: '👮', 
                comment: 'Uh oh. The fun police are here. Did you forget your chores? We saw nothing.' 
            },
            { 
                emoji: '🧌', 
                comment: 'Oof. Goblin energy is strong. Hide your snacks and lock the door. Just kidding... mostly.' 
            },
            { 
                emoji: '👁️‍🗨️', 
                comment: 'Awkward! Someone\'s watching. Embrace the nudist colony of life... or put on a shirt.' 
            },
            { 
                emoji: '🕉️', 
                comment: 'The ancestors have your back. You\'re too powerful for Mondays. Use this wisely.' 
            },
            { 
                emoji: '🎭', 
                comment: 'Drama! You\'re the main character today. Own it, cry, or dance. We support you.' 
            }
        ];

        // ============================================================
        //  DOM REFS
        // ============================================================
        const grid = document.getElementById('doorGrid');
        const commentary = document.getElementById('commentary');
        const counterDisplay = document.getElementById('counterDisplay');
        const fateBadge = document.getElementById('fateBadge');
        const resetBtn = document.getElementById('resetGame');
        const shuffleBtn = document.getElementById('shuffleDoors');

        // ============================================================
        //  STATE
        // ============================================================
        let currentFates = [];
        let revealedCount = 0;
        let isGameActive = true;
        let isKnocking = false;

        // ============================================================
        //  UTILITY
        // ============================================================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getRandomCommentary() {
            const comments = [
                'The Prince is pondering your fate...',
                'Knock knock... who\'s there? Your destiny.',
                'The doors are whispering secrets...',
                'One of these holds your next hour of luck.',
                'The universe is shuffling your cards...',
                'Which door calls your name?'
            ];
            return comments[Math.floor(Math.random() * comments.length)];
        }

        // ============================================================
        //  UPDATE UI
        // ============================================================
        function updateCounter() {
            counterDisplay.textContent = `Doors opened: ${revealedCount} / 9`;
            const pct = Math.round((revealedCount / 9) * 100);
            fateBadge.textContent = revealedCount === 9 ? '🏁 All fates revealed!' : `✨ Luck progress: ${pct}%`;
        }

        function setCommentary(emoji, text) {
            commentary.innerHTML = `
                <span>
                    <span class="comment-emoji">${emoji || '👑'}</span>
                    <span>${text}</span>
                </span>
            `;
        }

        // ============================================================
        //  RENDER DOORS
        // ============================================================
        function renderDoors() {
            grid.innerHTML = '';
            currentFates = shuffleArray([...FATES]);
            revealedCount = 0;
            isGameActive = true;
            isKnocking = false;
            updateCounter();
            setCommentary('👋', 'The Prince awaits. Tap a door...');

            currentFates.forEach((fate, index) => {
                const door = document.createElement('div');
                door.className = 'door';
                door.dataset.index = index;
                door.dataset.revealed = 'false';
                door.innerHTML = `
                    🚪
                    <span class="door-number">${index + 1}</span>
                `;
                door.addEventListener('click', doorClickHandler);
                grid.appendChild(door);
            });
        }

        // ============================================================
        //  DOOR CLICK HANDLER
        // ============================================================
        function doorClickHandler(e) {
            const door = e.currentTarget;

            // Guard conditions
            if (door.dataset.revealed === 'true') {
                setCommentary('🙄', 'You already opened this one. Try another door!');
                return;
            }
            if (!isGameActive) {
                setCommentary('🏁', 'All doors are open! Hit "New Fate" to play again.');
                return;
            }
            if (isKnocking) return;

            const index = parseInt(door.dataset.index);
            const fate = currentFates[index];

            // --- KNOCKING PHASE ---
            isKnocking = true;
            door.classList.add('knocking');
            setCommentary('👊', `*Knock knock!* The Prince is checking door ${index + 1}...`);

            // --- REVEAL PHASE (after knock) ---
            setTimeout(() => {
                door.classList.remove('knocking');
                door.classList.add('revealed');
                door.innerHTML = fate.emoji;
                door.dataset.revealed = 'true';

                // Update state
                revealedCount++;
                updateCounter();

                // Show fate commentary
                setCommentary(fate.emoji, fate.comment);

                // Check win condition
                if (revealedCount === 9) {
                    isGameActive = false;
                    setCommentary('🏆', 'ALL DOORS OPEN! You have seen all fates. The Prince bows to you. Reset for a new destiny.');
                }

                isKnocking = false;

            }, 550);
        }

        // ============================================================
        //  RESET / SHUFFLE
        // ============================================================
        function resetGame() {
            renderDoors();
            setCommentary('🔄', 'Fates have been reshuffled. The Prince awaits your choice...');
        }

        function shuffleDoors() {
            if (isKnocking) return;
            // Only shuffle unrevealed doors (if game still active)
            if (!isGameActive) {
                resetGame();
                return;
            }

            const doors = grid.querySelectorAll('.door');
            const revealedIndices = [];
            const unrevealedFates = [];

            // Collect unrevealed fates
            doors.forEach((door, idx) => {
                if (door.dataset.revealed === 'true') {
                    revealedIndices.push(idx);
                } else {
                    unrevealedFates.push(currentFates[idx]);
                }
            });

            // Shuffle only the unrevealed ones
            shuffleArray(unrevealedFates);

            // Rebuild currentFates with shuffled unrevealed
            let unrevealedIdx = 0;
            const newFates = [];
            for (let i = 0; i < currentFates.length; i++) {
                if (revealedIndices.includes(i)) {
                    newFates[i] = currentFates[i]; // keep revealed
                } else {
                    newFates[i] = unrevealedFates[unrevealedIdx++];
                }
            }
            currentFates = newFates;

            // Re-render only unrevealed doors
            doors.forEach((door, idx) => {
                if (door.dataset.revealed === 'false') {
                    door.innerHTML = `
                        🚪
                        <span class="door-number">${idx + 1}</span>
                    `;
                    door.classList.remove('revealed');
                    door.dataset.revealed = 'false';
                }
            });

            setCommentary('🎲', 'The unrevealed doors have been shuffled! The Prince is amused.');
        }

        // ============================================================
        //  INIT
        // ============================================================
        renderDoors();

        // Event listeners
        resetBtn.addEventListener('click', resetGame);
        shuffleBtn.addEventListener('click', shuffleDoors);

        // Keyboard shortcut: 'R' for reset
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') resetGame();
            if (e.key === 's' || e.key === 'S') shuffleDoors();
        });

        console.log('👑 Meeting Your Days Luck – 9 Doors of Fate loaded!');
        console.log('💡 Tip: Press "R" to reset, "S" to shuffle.');
    })();
</script>

</body>
</html>
